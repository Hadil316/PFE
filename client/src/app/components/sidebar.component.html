<aside class="w-[280px] bg-[#0b1320] h-screen flex flex-col shadow-2xl border-r border-slate-800 relative">
  
  <!-- Logo -->
  <div class="pt-12 px-6 pb-10 flex items-center gap-4">
    <div class="w-12 h-12 rounded-xl bg-[#0ea5e9] flex items-center justify-center text-white text-2xl shadow-lg">⚡</div>
    <h1 class="text-2xl font-bold text-white tracking-tighter">EMS VOLT</h1>
  </div>

  <!-- Menu Navigation -->
  <nav class="flex-1 px-4 space-y-2 overflow-y-auto">
    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-4 mb-2">Suivi</p>
    
    <button (click)="navigateTo('dashboard')" [class.bg-[#0ea5e9]]="activeButton() === 'overview'" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-slate-300 hover:text-white transition-all">
      📊 Overview
    </button>
    
    <button (click)="navigateTo('hierarchy')" [class.bg-[#0ea5e9]]="activeButton() === 'hierarchy'" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-slate-300 hover:text-white transition-all">
      🌳 Hiérarchie
    </button>
    
    <button *ngIf="authService.isAdmin()" (click)="navigateTo('users')" [class.bg-[#0ea5e9]]="activeButton() === 'users'" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-slate-300 hover:text-white transition-all">
      👥 Utilisateurs
    </button>
    
    <div class="my-4 border-t border-slate-700/50"></div>

    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-4 mb-2">Analytique</p>
    
    <button (click)="navigateTo('alerts')" [class.bg-red-600]="activeButton() === 'alerts'" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-slate-300 hover:text-white transition-all">
      🔔 Alertes
    </button>
    
    <button (click)="navigateTo('reports')" [class.bg-emerald-600]="activeButton() === 'reports'" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-slate-300 hover:text-white transition-all">
      📋 Rapports
    </button>
    
    <button (click)="navigateTo('billing')" [class.bg-purple-600]="activeButton() === 'billing'" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold text-slate-300 hover:text-white transition-all">
      💳 Facturation
    </button>
  </nav>

  <!-- Bouton Déconnexion -->
  <div class="p-6 border-t border-slate-800">
    <button (click)="askLogout()" class="w-full flex items-center gap-3 px-4 py-3 text-red-400 hover:bg-red-500/10 rounded-xl font-bold transition-all">
      🚪 Déconnexion
    </button>
  </div>

  <!-- MODAL DE CONFIRMATION -->
  <div *ngIf="showLogoutModal()" class="fixed inset-0 z-[9999] flex items-center justify-center bg-black/60 backdrop-blur-sm">
    <div class="bg-white p-8 rounded-[2rem] shadow-2xl w-96 text-center animate-in fade-in zoom-in duration-200">
      <div class="w-20 h-20 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl">❓</div>
      <h3 class="text-2xl font-black text-slate-900 mb-2">Déconnexion</h3>
      <p class="text-slate-500 font-medium mb-8 px-4">Souhaitez-vous vraiment quitter l'application ?</p>
      
      <div class="flex gap-3">
        <button (click)="cancelLogout()" class="flex-1 py-4 bg-slate-100 text-slate-500 rounded-2xl font-bold hover:bg-slate-200">
          Annuler
        </button>
        <button (click)="confirmLogout()" class="flex-1 py-4 bg-red-500 text-white rounded-2xl font-bold shadow-lg shadow-red-500/30 hover:bg-red-600">
          Oui, sortir
        </button>
      </div>
    </div>
  </div>

</aside>
